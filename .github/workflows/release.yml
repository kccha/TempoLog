name: Release Obsidian plugin

on:
    push:
        tags:
            - '*'
    workflow_dispatch:
        inputs:
            tag:
                description: Tag to build and upload release assets for
                required: true
                type: string

jobs:
    build:
        runs-on: ubuntu-latest
        env:
            RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Build plugin
              run: |
                  npm ci
                  npm run build

            - name: Verify manifest version matches tag
              run: |
                  node --input-type=module <<'EOF'
                  import fs from 'node:fs';

                  const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));

                  if (manifest.version !== process.env.RELEASE_TAG) {
                    console.error(`manifest.json version ${manifest.version} does not match release tag ${process.env.RELEASE_TAG}`);
                    process.exit(1);
                  }
                  EOF

            - name: Check for optional styles
              id: styles
              run: |
                  [ -f styles.css ] && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

            - name: List release assets
              id: assets
              run: |
                  assets=("main.js" "manifest.json")

                  if [ "${{ steps.styles.outputs.exists }}" = "true" ]; then
                    assets+=("styles.css")
                  fi

                  {
                    echo "paths<<EOF"
                    printf '%s\n' "${assets[@]}"
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: Attest build provenance
              uses: actions/attest@v4
              with:
                  subject-path: ${{ steps.assets.outputs.paths }}

            - name: Create or update release assets
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  assets=("main.js" "manifest.json")

                  if [ "${{ steps.styles.outputs.exists }}" = "true" ]; then
                    assets+=("styles.css")
                  fi

                  if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
                    gh release create "$RELEASE_TAG" \
                      --title="$RELEASE_TAG" \
                      --draft \
                      --verify-tag
                  fi

                  gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
